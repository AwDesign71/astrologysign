<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="./css/style.css">
<title>AstrologySign</title>
</head>
<body>
    <a href="/">
        <img src="https://localhost/I59432-F03454-I9322-V/assets/brand/logo.svg" alt="Star logo">
        <span>AstrologySign</span>
        <span>Made By AMW Dezign</span>
    </a>
    <h1>Enter Your Date of Birth</h1>
    <p>
        Use the format date/month/year to enter your birthday.
    </p>
    <form>
        <input type="number" min="01" max="31" placeholder="01">
        <select name="" id="month">
            <option value="January" selected>January</option>
            <option value="February">February</option>
            <option value="March">March</option>
            <option value="April">April</option>
            <option value="May">May</option>
            <option value="June">June</option>
            <option value="July">July</option>
            <option value="August">August</option>
            <option value="September">September</option>
            <option value="October">October</option>
            <option value="November">November</option>
            <option value="December">December</option>
        </select>
        <input type="number" min="1920" max="2026" placeholder="1920">
        <button>See your sign</button>
    </form>
    <!-- This image area is dynamic -->
    <img src="https://localhost/I59432-F03454-I9322-V/assets/signs/aquarius.svg" alt="Zodiac Signs">
    <!-- The text is dynamic as well -->
    <p>
        You were born on Tuesday, February 02, 2008. And your sign is Aquarius.
    </p>
    <img src="https://localhost/I59432-F03454-I9322-V/assets/accent/home-accent.svg" alt="background image">
</body>
</html>
